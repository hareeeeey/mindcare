<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: system-ui;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container {
  width:400px;
  height:600px;
  background:rgba(0,0,0,0.7);
  border-radius:12px;
  display:flex;
  flex-direction:column;
  padding:15px;
  color:white;
}
.top {
  display:flex;
  justify-content:space-between;
}
#chat {
  flex:1;
  overflow-y:auto;
}
.msg {
  margin:8px;
  padding:10px;
  border-radius:8px;
}
.user { background:#6cb2ff; color:black; margin-left:auto; }
.bot { background:#333; }
.input {
  display:flex;
  gap:10px;
}
input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
}
button {
  padding:10px;
  background:#6cb2ff;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
  <div id="name"></div>
  <button onclick="logout()">Logout</button>
</div>

<div id="chat"></div>

<div class="input">
  <input id="input" placeholder="Type message">
  <button onclick="send()">Send</button>
</div>

</div>

<script>
const email = localStorage.getItem("userEmail");
const name = localStorage.getItem("userName");

// 🔒 Redirect if not logged in
if (!email) {
  alert("Login required");
  window.location.href = "login.html";
}

// 👋 Set username
document.getElementById("name").innerText = "Hi " + (name || "User");

const chat = document.getElementById("chat");

// Add message
function add(text, who) {
  const div = document.createElement("div");
  div.className = "msg " + who;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Initial message
add("How are you feeling today?", "bot");

// Send message
async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  add(text, "user");
  input.value = "";

  try {
    const res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-auth": email
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    console.log("API:", data);

    if (!data.reply) {
      add("No response ❌", "bot");
      return;
    }

    add(data.reply, "bot");

  } catch (err) {
    console.error(err);
    add("Connection error ❌", "bot");
  }
}

// Enter key
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    send();
  }
});

// Logout
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
