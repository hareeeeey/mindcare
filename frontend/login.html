<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mindcare Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    background:#0f0f0f;
    color: #fff;
}

/* LEFT = IMAGE (60%) */
.left-panel {
    width: 60%;
    background-image: url("aa.jpg");
    background-size: cover;
    background-position: center;
    position: relative;
}

/* optional overlay */
.left-panel::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
}

/* RIGHT = FORM (40%) */
.right-panel {
    width: 40%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* FORM BOX */
.container {
    width: 100%;
    max-width: 320px;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
}

.logo-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background-image: url("Vector.png");
    background-size: cover;
    background-position: center;
}

.logo span {
    font-size: 22px;
    font-weight: 500;
    color: #d1d5db;
}

h1 {
    font-size: 28px;
    margin-bottom: 30px;
    font-weight: 500;
}

label {
    font-size: 13px;
    color: #9ca3af;
    display: block;
    margin-bottom: 6px;
}

/* INPUT GROUP */
.input-group {
    position: relative;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px;
    padding-right: 40px;
    border-radius: 10px;
    border: 1px solid #3d3d3daf;
    background: #111;
    color: #fff;
    outline: none;
}

input:focus {
    border-color: #2563eb;
}

/* EYE BUTTON */
.eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 14px;
    color: #9ca3af;
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #1e3a5f;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    margin-top: 5px;
}

.btn:hover {
    background: #244a78;
}

.forgot {
    text-align: center;
    font-size: 12px;
    color: #6b7280;
    margin-top: 12px;
}

.secondary {
    margin-top: 25px;
    text-align: center;
    font-size: 13px;
    color: #9ca3af;
}

.secondary a {
    color: #fff;
    text-decoration: none;
    cursor: pointer;
}

.create-btn {
    margin-top: 20px;
    background: #1e3a5f;
}
</style>
</head>

<body>

<!-- LEFT IMAGE -->
<div class="left-panel"></div>

<!-- RIGHT FORM -->
<div class="right-panel">
    <div class="container">

        <div class="logo">
            <div class="logo-circle"></div>
            <span>Mindcare</span>
        </div>

        <h1>Welcome back!</h1>

        <label>Email:</label>
        <div class="input-group">
            <input type="text" id="username" />
        </div>

        <label>Password:</label>
        <div class="input-group">
            <input type="password" id="password" />
            <span class="eye-btn" onclick="togglePassword()">👁</span>
        </div>

        <button class="btn" onclick="login()">Login</button>

        <div class="forgot">Forgot password?</div>

        <div class="secondary">
            Don’t have an account? 
            <a onclick="goToSignup()">Sign up here</a>
        </div>

        <button class="btn create-btn" onclick="goToSignup()">Create Account</button>

    </div>
</div>

<script>
// redirect
function goToSignup() {
    window.location.href = "signup.html";
}

// toggle password
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

// login
async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!username || !password) {
        alert("Please fill all fields");
        return;
    }

    // Gmail validation
    const gmailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
    if (!gmailRegex.test(username)) {
        alert("Please enter a valid Gmail ID");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
    }

    try {
        const res = await fetch("http://localhost:3000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
            alert("Invalid email or password");
            return;
        }

        localStorage.setItem("username", data.user.username);

        if (data.user.name) {
            localStorage.setItem("name", data.user.name);
        }

        alert("Login successful");
        window.location.href = "chatbot.html";

    } catch (err) {
        alert("Server error. Try again.");
    }
}

// enter key
document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        login();
    }
});
</script>

</body>
</html>
